version: "1.0"
name: "cloudsec-sre-env"
description: "Autonomous Zero-Trust SRE Agent Environment. Simulates a microservices architecture under attack where the agent must investigate alerts, contain threats, and fix access policies without taking down production."
author: "Aditi Mehta"
tasks:
  - id: "easy_brute_force"
    difficulty: "easy"
    description: "Analyze the SIEM alert and block the specific external IP causing a high volume of failed login attempts."
  - id: "medium_lateral_movement"
    difficulty: "medium"
    description: "Identify and isolate the compromised frontend pod attempting unauthorized lateral queries to the internal HR database."
  - id: "hard_insider_threat"
    difficulty: "hard"
    description: "Detect the anomalous data exfiltration, identify the compromised IAM role, and revoke it while maintaining 99% service uptime for legitimate traffic."
entrypoint: "server.environment:CloudSecEnv"